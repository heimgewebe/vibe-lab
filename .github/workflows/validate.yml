name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python3 -m pip install pyyaml jsonschema rfc3339-validator

      - name: Validate schemas
        run: python3 scripts/docmeta/validate_schema.py

      - name: Validate execution proof
        run: python3 scripts/docmeta/validate_execution_proof.py

      - name: Validate relations
        run: python3 scripts/docmeta/validate_relations.py

      - name: Validate interpretation budget
        run: python3 scripts/docmeta/validate_interpretation_budget.py

      - name: Test interpretation budget validator
        run: python3 scripts/docmeta/test_validate_interpretation_budget.py

      - name: Validate agent handoff
        run: python3 scripts/docmeta/validate_agent_handoff.py

      - name: Test agent handoff validator
        run: python3 scripts/docmeta/test_validate_agent_handoff.py

      - name: Validate Phase-1c fixture checker corpus
        run: python3 scripts/docmeta/validate_experiment_structure_phase1c_fixtures.py

      - name: Test Phase-1c fixture checker
        run: python3 scripts/docmeta/test_validate_experiment_structure_phase1c_fixtures.py

      - name: Regenerate canonical diagnostics
        run: make generate-canonical

      - name: Check canonical diagnostics contract
        run: |
          if git status --porcelain -- docs/_generated/doc-index.md docs/_generated/system-map.md | grep -q .; then
            echo "❌ Canonical diagnostics contract violated. Run 'make generate-canonical' and commit the changes."
            git status --porcelain -- docs/_generated/doc-index.md docs/_generated/system-map.md
            exit 1
          fi

  derived-diagnostics:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python3 -m pip install pyyaml jsonschema rfc3339-validator

      - name: Generate derived diagnostics
        run: make generate-derived

      - name: Upload derived diagnostics artifact
        uses: actions/upload-artifact@v4
        with:
          name: derived-diagnostics
          path: |
            docs/_generated/backlinks.md
            docs/_generated/orphans.md

      - name: Show derived diagnostic drift (non-blocking)
        run: |
          if git status --porcelain -- docs/_generated/backlinks.md docs/_generated/orphans.md | grep -q .; then
            echo "ℹ️ Derived diagnostics differ from committed files (non-blocking)."
            git status --porcelain -- docs/_generated/backlinks.md docs/_generated/orphans.md
            git diff -- docs/_generated/backlinks.md docs/_generated/orphans.md || true
          else
            echo "✅ Derived diagnostics match committed files."
          fi

  ephemeral-diagnostics:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python3 -m pip install pyyaml jsonschema rfc3339-validator

      - name: Generate ephemeral diagnostics
        run: make generate-ephemeral

      - name: Upload ephemeral diagnostics artifact
        uses: actions/upload-artifact@v4
        with:
          name: ephemeral-diagnostics
          path: docs/_generated/epistemic-state.md
