name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python3 -m pip install pyyaml jsonschema rfc3339-validator

      - name: Validate schemas
        run: python3 scripts/docmeta/validate_schema.py

      - name: Test counterevidence P2-rule (validate_schema)
        run: python3 scripts/docmeta/test_validate_schema_counterevidence.py

      - name: Validate execution proof
        run: python3 scripts/docmeta/validate_execution_proof.py

      - name: Validate relations
        run: python3 scripts/docmeta/validate_relations.py

      - name: Validate interpretation budget
        run: python3 scripts/docmeta/validate_interpretation_budget.py

      - name: Test interpretation budget validator
        run: python3 scripts/docmeta/test_validate_interpretation_budget.py

      - name: Validate agent handoff
        run: python3 scripts/docmeta/validate_agent_handoff.py

      - name: Test agent handoff validator
        run: python3 scripts/docmeta/test_validate_agent_handoff.py

      - name: Validate agent commands
        run: python3 scripts/docmeta/validate_agent_commands.py

      - name: Test agent command validator
        run: python3 scripts/docmeta/test_validate_agent_commands.py

      - name: Validate command chain fixtures
        run: python3 scripts/docmeta/validate_command_chain.py

      - name: Test command chain validator
        run: python3 scripts/docmeta/test_validate_command_chain.py

      - name: Validate cross-contract (Handoff ↔ Chain) fixtures
        run: python3 scripts/docmeta/validate_command_chain.py --cross-contract-fixtures tests/fixtures/cross_contract

      - name: Test cross-contract validator
        run: python3 tests/contracts/test_cross_contract_chain.py

      - name: Replay dry-run (no mutations)
        run: python3 tools/vibe-cli/replay_minimal.py --dry-run

      - name: Guard — replay must not mutate the repo
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "❌ Replay dry-run produced filesystem changes (tracked or untracked). This violates the Phase-F-light contract."
            git status --porcelain
            exit 1
          fi
          echo "✅ Replay dry-run produced no filesystem changes."

      - name: Test replay runner
        run: python3 tools/vibe-cli/test_replay_minimal.py

      - name: Validate Phase-1c fixture checker corpus
        run: python3 scripts/docmeta/validate_experiment_structure_phase1c_fixtures.py

      - name: Test Phase-1c fixture checker
        run: python3 scripts/docmeta/test_validate_experiment_structure_phase1c_fixtures.py

      - name: Validate adoption completeness
        run: python3 scripts/adoption/validate_adoption_completeness.py

      - name: Test adoption completeness validator
        run: python3 scripts/adoption/test_validate_adoption_completeness.py

      - name: Validate generated-artifact contract (v2)
        run: python3 scripts/docmeta/validate_generated_artifacts_contract.py

      - name: Run generated-artifact contract regression tests
        run: python3 scripts/docmeta/test_validate_generated_artifacts_contract.py

      - name: Validate artifact taxonomy contract
        run: python3 scripts/docmeta/validate_artifact_taxonomy.py

      - name: Run artifact taxonomy contract regression tests
        run: python3 scripts/docmeta/test_validate_artifact_taxonomy.py

      - name: Run artifact taxonomy generator regression tests
        run: python3 scripts/docmeta/test_generate_artifact_taxonomy.py

      - name: Fallback share advisory warning (non-blocking)
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path("docs/_generated/artifact-taxonomy.json").read_text())
          summary = data.get("summary", {})
          share = float(summary.get("fallback_share", 0.0))
          threshold = float(summary.get("fallback_threshold", 0.5))

          if share > threshold:
              print(
                  f"::warning title=Artifact taxonomy fallback share high::"
                  f"fallback_share={share:.1%} exceeds advisory threshold {threshold:.0%}; "
                  f"refine broad catch-all rules or justify baseline."
              )
          PY

      - name: Test epistemic state generator
        run: python3 scripts/docmeta/test_generate_epistemic_state.py

      - name: Test export generator
        run: python3 scripts/exports/test_generate_exports.py

      - name: Test promotion-readiness validator
        run: python3 scripts/docmeta/test_promotion_readiness.py

      - name: Validate promotion-readiness (dry-run, Phase 1)
        run: python3 scripts/docmeta/validate_promotion_readiness.py

      - name: Regenerate blocking artifacts
        run: make generate-blocking

      - name: Check blocking generated-artifact contract
        run: |
          # Blocking artifacts are contract-driven via .vibe/generated-artifacts.yml (v2).
          # Filter: --ci-policy blocking. Includes generated_index (doc-index) and
          # generated_projection (exports/copilot, exports/cursor).
          mapfile -t blocking_paths < <(python3 scripts/docmeta/resolve_generated_artifact_paths.py --ci-policy blocking)
          if [[ "${#blocking_paths[@]}" -eq 0 ]]; then
            echo "ERROR: blocking artifact list from .vibe/generated-artifacts.yml is empty"
            exit 1
          fi
          if git status --porcelain -- "${blocking_paths[@]}" | grep -q .; then
            echo "❌ Blocking generated-artifact contract violated. Run 'make generate-blocking' and commit the changes."
            git status --porcelain -- "${blocking_paths[@]}"
            git diff -- "${blocking_paths[@]}" || true
            exit 1
          fi

  non-blocking-diagnostics:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python3 -m pip install pyyaml jsonschema rfc3339-validator

      - name: Generate non-blocking diagnostic artifacts
        run: make generate-generated-diagnostics

      - name: Generate gated diagnostic artifacts (best effort)
        run: make generate-generated-gated || true

      - name: Resolve non-blocking diagnostic paths
        id: non_blocking_paths
        run: |
          {
            echo "paths<<EOF"
            python3 scripts/docmeta/resolve_generated_artifact_paths.py --ci-policy non_blocking
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload non-blocking diagnostics artifact
        uses: actions/upload-artifact@v4
        with:
          name: generated-diagnostics
          path: ${{ steps.non_blocking_paths.outputs.paths }}
          if-no-files-found: warn

      - name: Resolve gated/best-effort paths
        id: gated_paths
        run: |
          {
            echo "paths<<EOF"
            python3 scripts/docmeta/resolve_generated_artifact_paths.py --ci-policy best_effort
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload gated diagnostics artifact (best effort)
        uses: actions/upload-artifact@v4
        with:
          name: gated-diagnostics
          path: ${{ steps.gated_paths.outputs.paths }}
          if-no-files-found: ignore

      - name: Generate non-blocking diagnostics drift report
        id: non_blocking_drift
        run: |
          report="generated-drift-report.txt"
          : > "$report"

          mapfile -t derived_paths < <(python3 scripts/docmeta/resolve_generated_artifact_paths.py --ci-policy non_blocking)
          if [[ "${#derived_paths[@]}" -eq 0 ]]; then
            echo "No non-blocking diagnostic paths resolved from contract." >> "$report"
            echo "drift_detected=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git status --porcelain -- "${derived_paths[@]}" | grep -q .; then
            {
              echo "Non-blocking diagnostics drift detected."
              echo
              echo "[git status --porcelain]"
              git status --porcelain -- "${derived_paths[@]}"
              echo
              echo "[git diff]"
              git diff -- "${derived_paths[@]}" || true
            } >> "$report"
            echo "drift_detected=true" >> "$GITHUB_OUTPUT"
          else
            echo "No non-blocking diagnostics drift detected." >> "$report"
            echo "drift_detected=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Soft escalation for diagnostics drift (warning only)
        if: steps.non_blocking_drift.outputs.drift_detected == 'true'
        run: |
          echo "::warning title=Generated diagnostics drift::Non-blocking diagnostics changed; review generated-drift-report.txt."

      - name: Upload generated drift report artifact
        uses: actions/upload-artifact@v4
        with:
          name: generated-drift-report
          path: generated-drift-report.txt

  ephemeral-diagnostics:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python3 -m pip install pyyaml jsonschema rfc3339-validator

      - name: Generate epistemic state
        run: make generate-epistemic-state

      - name: Resolve ephemeral_trace artifact paths from contract
        id: ephemeral_paths
        run: |
          {
            echo "paths<<EOF"
            python3 scripts/docmeta/resolve_generated_artifact_paths.py --class ephemeral_trace
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload ephemeral diagnostics artifact
        uses: actions/upload-artifact@v4
        with:
          name: ephemeral-diagnostics
          path: ${{ steps.ephemeral_paths.outputs.paths }}
