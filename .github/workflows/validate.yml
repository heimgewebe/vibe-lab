name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python3 -m pip install pyyaml jsonschema rfc3339-validator

      - name: Validate schemas
        run: python3 scripts/docmeta/validate_schema.py

      - name: Test counterevidence P2-rule (validate_schema)
        run: python3 scripts/docmeta/test_validate_schema_counterevidence.py

      - name: Validate execution proof
        run: python3 scripts/docmeta/validate_execution_proof.py

      - name: Validate relations
        run: python3 scripts/docmeta/validate_relations.py

      - name: Validate interpretation budget
        run: python3 scripts/docmeta/validate_interpretation_budget.py

      - name: Test interpretation budget validator
        run: python3 scripts/docmeta/test_validate_interpretation_budget.py

      - name: Validate agent handoff
        run: python3 scripts/docmeta/validate_agent_handoff.py

      - name: Test agent handoff validator
        run: python3 scripts/docmeta/test_validate_agent_handoff.py

      - name: Validate agent commands
        run: python3 scripts/docmeta/validate_agent_commands.py

      - name: Test agent command validator
        run: python3 scripts/docmeta/test_validate_agent_commands.py

      - name: Validate command chain fixtures
        run: python3 scripts/docmeta/validate_command_chain.py

      - name: Test command chain validator
        run: python3 scripts/docmeta/test_validate_command_chain.py

      - name: Validate cross-contract (Handoff ↔ Chain) fixtures
        run: python3 scripts/docmeta/validate_command_chain.py --cross-contract-fixtures tests/fixtures/cross_contract

      - name: Test cross-contract validator
        run: python3 tests/contracts/test_cross_contract_chain.py

      - name: Replay dry-run (no mutations)
        run: python3 tools/vibe-cli/replay_minimal.py --dry-run

      - name: Guard — replay must not mutate the repo
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "❌ Replay dry-run produced filesystem changes (tracked or untracked). This violates the Phase-F-light contract."
            git status --porcelain
            exit 1
          fi
          echo "✅ Replay dry-run produced no filesystem changes."

      - name: Test replay runner
        run: python3 tools/vibe-cli/test_replay_minimal.py

      - name: Validate Phase-1c fixture checker corpus
        run: python3 scripts/docmeta/validate_experiment_structure_phase1c_fixtures.py

      - name: Test Phase-1c fixture checker
        run: python3 scripts/docmeta/test_validate_experiment_structure_phase1c_fixtures.py

      - name: Validate adoption completeness
        run: python3 scripts/adoption/validate_adoption_completeness.py

      - name: Test adoption completeness validator
        run: python3 scripts/adoption/test_validate_adoption_completeness.py

      - name: Test epistemic state generator
        run: python3 scripts/docmeta/test_generate_epistemic_state.py

      - name: Test export generator
        run: python3 scripts/exports/test_generate_exports.py

      - name: Test promotion-readiness validator
        run: python3 scripts/docmeta/test_promotion_readiness.py

      - name: Validate promotion-readiness (dry-run, Phase 1 — non-blocking)
        continue-on-error: true
        run: python3 scripts/docmeta/validate_promotion_readiness.py

      - name: Regenerate canonical diagnostics
        run: make generate-canonical

      - name: Check canonical diagnostics contract
        run: |
          # NOTE: canonical file list is contract-driven via .vibe/generated-artifacts.yml.
          # Keep make targets and docs/index.md classification aligned with this contract.
          mapfile -t canonical_paths < <(python3 scripts/docmeta/resolve_generated_artifact_paths.py canonical)
          if [[ "${#canonical_paths[@]}" -eq 0 ]]; then
            echo "ERROR: canonical path list from .vibe/generated-artifacts.yml is empty"
            exit 1
          fi
          if git status --porcelain -- "${canonical_paths[@]}" | grep -q .; then
            echo "❌ Canonical diagnostics contract violated. Run 'make generate-canonical' and commit the changes."
            git status --porcelain -- "${canonical_paths[@]}"
            git diff -- "${canonical_paths[@]}" || true
            exit 1
          fi

      - name: Check exports contract
        run: |
          mapfile -t export_paths < <(python3 scripts/docmeta/resolve_generated_artifact_paths.py exports)
          if [[ "${#export_paths[@]}" -eq 0 ]]; then
            echo "ERROR: exports path list from .vibe/generated-artifacts.yml is empty"
            exit 1
          fi
          if git status --porcelain -- "${export_paths[@]}" | grep -q .; then
            echo "❌ Exports contract violated. Run 'make generate-exports' and commit the changes."
            git status --porcelain -- "${export_paths[@]}"
            git diff -- "${export_paths[@]}" || true
            exit 1
          fi

  derived-diagnostics:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python3 -m pip install pyyaml jsonschema rfc3339-validator

      - name: Generate derived core diagnostics
        run: make generate-derived-core

      - name: Generate derived gated diagnostics (best effort)
        run: make generate-derived-gated || true

      - name: Resolve derived core paths
        id: derived_core_paths
        run: |
          {
            echo "paths<<EOF"
            python3 scripts/docmeta/resolve_generated_artifact_paths.py derived
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload derived diagnostics artifact
        uses: actions/upload-artifact@v4
        with:
          name: derived-diagnostics
          path: ${{ steps.derived_core_paths.outputs.paths }}
          if-no-files-found: warn

      - name: Resolve gated paths
        id: gated_paths
        run: |
          {
            echo "paths<<EOF"
            python3 scripts/docmeta/resolve_generated_artifact_paths.py gated
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload gated diagnostics artifact (best effort)
        uses: actions/upload-artifact@v4
        with:
          name: gated-diagnostics
          path: ${{ steps.gated_paths.outputs.paths }}
          if-no-files-found: ignore

      - name: Generate derived drift report (non-blocking)
        id: derived_drift
        run: |
          report="generated-drift-report.txt"
          : > "$report"

          mapfile -t derived_paths < <(python3 scripts/docmeta/resolve_generated_artifact_paths.py derived)
          if [[ "${#derived_paths[@]}" -eq 0 ]]; then
            echo "No derived-core paths resolved from contract." >> "$report"
            echo "drift_detected=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git status --porcelain -- "${derived_paths[@]}" | grep -q .; then
            {
              echo "Derived diagnostics drift detected."
              echo
              echo "[git status --porcelain]"
              git status --porcelain -- "${derived_paths[@]}"
              echo
              echo "[git diff]"
              git diff -- "${derived_paths[@]}" || true
            } >> "$report"
            echo "drift_detected=true" >> "$GITHUB_OUTPUT"
          else
            echo "No derived diagnostics drift detected." >> "$report"
            echo "drift_detected=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Soft escalation for derived drift (warning only)
        if: steps.derived_drift.outputs.drift_detected == 'true'
        run: |
          echo "::warning title=Generated diagnostics drift::Derived diagnostics changed; review generated-drift-report.txt."

      - name: Upload generated drift report artifact
        uses: actions/upload-artifact@v4
        with:
          name: generated-drift-report
          path: generated-drift-report.txt

  ephemeral-diagnostics:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python3 -m pip install pyyaml jsonschema rfc3339-validator

      - name: Generate ephemeral diagnostics
        run: make generate-ephemeral

      - name: Resolve ephemeral diagnostics paths from contract
        id: ephemeral_paths
        run: |
          {
            echo "paths<<EOF"
            python3 scripts/docmeta/resolve_generated_artifact_paths.py ephemeral
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload ephemeral diagnostics artifact
        uses: actions/upload-artifact@v4
        with:
          name: ephemeral-diagnostics
          path: ${{ steps.ephemeral_paths.outputs.paths }}
