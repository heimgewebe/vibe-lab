schema_version: "2.0.0"
contract: generated_artifacts
triggered_by: "agent-instruction-2026-04-25-generated-artifact-contract-v2"

# Object-based generated-artifact contract.
# Replaces the legacy bucket grouping (canonical/derived/gated/exports/ephemeral)
# with explicit per-artifact objects. See:
#   experiments/2026-04-19_generated-artifact-contract-validation/artifacts/
#     contract-v2-reconciliation.md
# for the historical reconciliation note.

defaults:
  origin: generated
  lifecycle: regenerated
  activation: always
  enforcement:
    - no_manual_edit

classes:
  generated_index:
    description: "Generated index or navigation surface."
    authority: navigation_surface
  diagnostic_report:
    description: "Generated diagnostic report; review-relevant, not truth-bearing."
    authority: diagnostic_signal
  diagnostic_dry_run:
    description: "Dry-run output for a guard or gate without hard enforcement."
    authority: diagnostic_signal
  metric_report:
    description: "Generated metric or trend surface."
    authority: diagnostic_signal
  generated_projection:
    description: "Tool-specific projection generated from canonical source material."
    authority: generated_projection
  ephemeral_trace:
    description: "Short-lived runtime or diagnostic output."
    authority: runtime_observation

artifacts:
  - path: docs/_generated/doc-index.md
    class: generated_index
    generator: scripts/docmeta/generate_doc_index.py
    authority: navigation_surface
    origin: generated
    lifecycle: regenerated
    enforcement: [ci_blocking, no_manual_edit]
    activation: always
    commit_policy: commit_required
    ci_policy: blocking

  - path: docs/_generated/system-map.md
    class: diagnostic_report
    generator: scripts/docmeta/generate_system_map.py
    authority: diagnostic_signal
    origin: generated
    lifecycle: regenerated
    enforcement: [non_blocking_diagnostic, no_manual_edit]
    activation: always
    commit_policy: optional
    ci_policy: non_blocking

  - path: docs/_generated/backlinks.md
    class: diagnostic_report
    generator: scripts/docmeta/generate_backlinks.py
    authority: diagnostic_signal
    origin: generated
    lifecycle: regenerated
    enforcement: [non_blocking_diagnostic, no_manual_edit]
    activation: always
    commit_policy: optional
    ci_policy: non_blocking

  - path: docs/_generated/orphans.md
    class: diagnostic_report
    generator: scripts/docmeta/generate_orphans.py
    authority: diagnostic_signal
    origin: generated
    lifecycle: regenerated
    enforcement: [non_blocking_diagnostic, no_manual_edit]
    activation: always
    commit_policy: optional
    ci_policy: non_blocking

  - path: docs/_generated/promotion-readiness.json
    class: diagnostic_dry_run
    generator: scripts/docmeta/validate_promotion_readiness.py
    authority: diagnostic_signal
    origin: generated
    lifecycle: regenerated
    enforcement: [non_blocking_diagnostic, no_manual_edit]
    activation: always
    commit_policy: optional
    ci_policy: non_blocking

  - path: docs/_generated/metrics/trends.md
    class: metric_report
    generator: scripts/docmeta/generate_metrics.py
    authority: diagnostic_signal
    origin: generated
    lifecycle: regenerated
    enforcement: [best_effort, no_manual_edit]
    activation: gated
    commit_policy: optional
    ci_policy: best_effort

  - path: docs/_generated/epistemic-state.md
    class: ephemeral_trace
    generator: scripts/docmeta/generate_epistemic_state.py
    authority: runtime_observation
    origin: generated
    lifecycle: regenerated
    enforcement: [artifact_only, no_manual_edit]
    activation: always
    commit_policy: do_not_commit
    ci_policy: artifact_only

  - path: docs/_generated/artifact-taxonomy.md
    class: diagnostic_report
    generator: scripts/docmeta/generate_artifact_taxonomy.py
    authority: diagnostic_signal
    origin: generated
    lifecycle: regenerated
    enforcement: [non_blocking_diagnostic, no_manual_edit]
    activation: always
    commit_policy: optional
    ci_policy: non_blocking

  - path: docs/_generated/artifact-taxonomy.json
    class: diagnostic_report
    generator: scripts/docmeta/generate_artifact_taxonomy.py
    authority: diagnostic_signal
    origin: generated
    lifecycle: regenerated
    enforcement: [non_blocking_diagnostic, no_manual_edit]
    activation: always
    commit_policy: optional
    ci_policy: non_blocking

  - path: exports/copilot/
    class: generated_projection
    generator: scripts/exports/generate_exports.py
    derives_from: instruction-blocks/*.md
    target_surface: copilot
    authority: generated_projection
    origin: projected
    lifecycle: regenerated
    enforcement: [ci_blocking, no_manual_edit]
    activation: always
    deterministic: true
    regenerable: true
    commit_policy: commit_required
    ci_policy: blocking

  - path: exports/cursor/
    class: generated_projection
    generator: scripts/exports/generate_exports.py
    derives_from: instruction-blocks/*.md
    target_surface: cursor
    authority: generated_projection
    origin: projected
    lifecycle: regenerated
    enforcement: [ci_blocking, no_manual_edit]
    activation: always
    deterministic: true
    regenerable: true
    commit_policy: commit_required
    ci_policy: blocking
