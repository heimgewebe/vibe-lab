    falsification_criterion: "Die Spec-First-Hypothese wäre geschwächt, wenn ein gleich langer, gleich strukturierter Nicht-Spec-Prompt vergleichbare oder bessere Ergebnisse bei Vollständigkeit, Konsistenz und Nacharbeit liefert."
