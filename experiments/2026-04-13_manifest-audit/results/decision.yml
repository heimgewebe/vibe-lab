  Die Inkonsistenz liegt auf Schema-Ebene (deklarierter Zustand ≠ tatsächlicher Zustand),
  nicht auf Wahrheitsebene (Beweise existieren trotzdem).

  Daraus folgt keine starke Empfehlung für execution_status als Pflichtfeld,
  aber ein klares Signal: Template und Schema signalisieren unterschiedliche Erwartungen.

