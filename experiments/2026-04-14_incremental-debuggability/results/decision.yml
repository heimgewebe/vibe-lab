next_steps: |
  Für einen zweiten Ausführungslauf empfohlen:
  1. Sonderfall "bugfreie Kontrolle" explizit in Erfolgskriterien aufnehmen
  2. time_to_fix-Messung mit Human-Developer oder unabhängigem AI-Agent ohne Vorwissen
  3. Input 5 mit nicht-numerischen Werten für Uppercase-Transform (um latenten Bug sichtbar zu machen)
  4. Symmetrischer Test: Single-Shot-Arm mit äquivalentem Bug vorbereiten
