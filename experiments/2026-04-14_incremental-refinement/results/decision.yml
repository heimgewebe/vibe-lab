# Decision — Incremental Refinement vs. Single-Shot
# Validiert gegen: (kein eigenes Schema im MVP; Struktur orientiert sich an der Pipeline-Logik)

schema_version: "0.1.0"

verdict: "inconclusive"
confidence: "low"
date: "2026-04-14"
reviewer: "copilot-agent"

rationale: |
  Incremental Refinement erzeugt in 3/3 Tasks sichtbar modulareren Code mit
  mehr expliziten Typen, Fehlerklassen und Separation of Concerns. Die These
  „Schrittzerlegung fördert Struktur" ist plausibel bis stark plausibel.

  Jedoch reicht die vorliegende Evidenz nicht für ein belastbares „adopted":

  1. Proxy-Metriken: Mehr Typen, mehr Error-Handling, mehr Dateien belegen
     Modularität, aber nicht automatisch bessere Software. Architektur ist
     kein Qualitätsbeweis ohne Laufzeit- und Testbelege.
  2. Fehlende Tests: method.md definiert Schritt 6 als „Tests generieren",
     aber keine Testdateien wurden erzeugt. Der Claim „bessere Testbarkeit"
     bleibt architektonische Plausibilität, nicht empirisch nachgewiesen.
  3. Rework nur geschätzt: Die Werte „<10% vs 30-50%" sind Einschätzungen,
     keine gemessenen Patch-Diffs.
  4. Laufzeitbug im Incremental-Arm: Task 2 incremental enthielt einen
     doppelten i++-Bug im CLI-Parser, der Argumente überspringt — trotz
     fehlerfreier Kompilierung. Typkorrekt ≠ laufzeitkorrekt.
  5. Experimentator-Bias: Derselbe Agent erzeugte beide Arme. Incremental
     bekam 6 Anläufe statt 1 — das misst teils „mehr Bearbeitungszeit +
     Strukturzwang", nicht nur „Strategieeffekt".

  Starker Designhinweis, aber noch kein robuster Wirknachweis.

evidence_summary:
  observations: 33
  positive: 8
  negative: 2
  neutral: 23

next_steps: |
  - Echte Tests pro Task ergänzen (Smoke-Tests, Unit-Tests)
  - Laufzeittest / Anforderungsmatrix (erfüllt / teilweise / nicht erfüllt)
  - Gemessene Nacharbeit in Patch-Zeilen statt Schätzung
  - Replikation mit anderem Modell und/oder menschlichem Experimentator
  - Decision Rule statt pauschales Verdict erwägen:
    Single-Shot für einfach, Incremental für mittel, Spec-First+Incremental für komplex

