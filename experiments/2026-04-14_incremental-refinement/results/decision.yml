# Decision — Incremental Refinement vs. Single-Shot
# Validiert gegen: (kein eigenes Schema im MVP; Struktur orientiert sich an der Pipeline-Logik)

schema_version: "0.1.0"

verdict: "adopted"
confidence: "medium"
date: "2026-04-14"
reviewer: "copilot-agent"

rationale: |
  Incremental Refinement produziert in 3/3 Tasks messbar bessere Codequalität:
  - 103% mehr Types/Interfaces (Ø 3.3 → 6.7)
  - 770% mehr Error-Handling-Konstrukte (Ø 1.0 → 8.7)
  - Modulare statt monolithische Architektur
  - Deutlich bessere Testbarkeit (isolierte Exports)
  - Weniger erwarteter Rework (<10% vs. 30-50%)

  Trade-off: 6× mehr Prompts, 2.1× mehr Codezeilen. Confidence "medium",
  weil nur ein Modell, ein Experimentator (Agent), und eine Zerlegungsstrategie
  getestet wurde. Replikation mit anderen Modellen und menschlichen
  Experimentatoren wäre nötig für höhere Confidence.

