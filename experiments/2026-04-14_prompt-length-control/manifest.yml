# Experiment Manifest
# Validiert gegen: schemas/experiment.manifest.schema.json

schema_version: "0.1.0"

experiment:
  name: "Prompt-Length Control"
  hypothesis: "Der Leistungszugewinn von Spec/Test-First beruht auf der *inhaltlichen Strukturierung* des Constraints-Raums (Declarative/Executable Mode), nicht lediglich auf dem *Erzwingen einer längeren initialen Output-Generierung* (Token-Bloat als Chain-of-Thought Proxy)."
  status: adopted
  category: technique
  cognitive_mode: exploratory
  execution_status: executed
  execution_refs: ["results/evidence.jsonl"]
  created: "2026-04-14"
  updated: "2026-04-14"
  author: "Jules"
  iteration: 1
  evidence_level: experimental
  adoption_basis: executed
  # Falsifizierbarkeits-Retrofit (Phase-1 Dry-Run, Trigger: need_for_reproducibility).
  # Das Experiment prüft die zentrale Gegenhypothese zu experiments/2026-04-08_spec-first:
  # Könnte das Token-Volumen (Chain-of-Thought-Proxy) statt der inhaltlichen Strukturierung
  # den Spec-First-Vorteil erklären? Der Ramble-First-Arm widerlegt das direkt.
  falsifiability:
    counter_hypothesis: "Die beobachtete Verbesserung entsteht nicht durch Spec-First selbst, sondern primär durch Promptlänge bzw. Token-Volumen als Chain-of-Thought-Proxy. Eine weitergehende Strukturierungs-/Aufgabenklärungs-Gegenhypothese bleibt nur teilweise adressiert."
    falsification_criterion: "Die Spec-First-Erklärung wird geschwächt, wenn ein gleich langer Nicht-Spec-Prompt oder ein gleich strukturierter Nicht-Spec-Prompt vergleichbare Ergebnisse bei Vollständigkeit, Konsistenz und Nacharbeit liefert."
    counterevidence_checked: true  # true bezieht sich auf die Token-Volumen-/Promptlängen-Gegenhypothese: Ramble-First-Arm (evidence.jsonl: metric=test_pass_rate_ramble_first, 2026-04-14T11:43:00Z, value=0.8) widerlegte Token-Bloat direkt. Strukturierungsgrad/Aufgabenklärung als Confounder bleibt Restunsicherheit.

context:
  tools: ["LLM-Agents", "Vibe-Coding"]
  language: "Python"
  environment: "Vibe-Lab"

evidence:
  format: jsonl
  path: results/evidence.jsonl
