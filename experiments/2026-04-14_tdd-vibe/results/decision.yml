  - "TDD-Vibe-Prompt als Candidate für prompts/adopted/ dokumentieren (noch nicht adoptiert — erst nach Replikation)"
  - "500-Lücke adressieren: Expliziten Error-Handler-Test in TDD-Vibe-Prompt einbauen"

