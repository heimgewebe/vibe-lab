# Experiment Manifest
schema_version: "0.1.0"

experiment:
  name: "Agent Task Validity"
  hypothesis: "Ein explizites Task-Protokoll verbessert Änderungsqualität nur dann messbar, wenn Aufgaben zuvor operationalisiert sind (Datei + Zielstelle + Änderungsart)."
  status: testing
  category: workflow
  execution_status: executed
  execution_refs:
    - "results/evidence.jsonl"
    - "results/result.md"
    - "artifacts/run-001-control.md"
    - "artifacts/run-002-treatment.md"
    - "artifacts/run-003-control/execution.txt"
    - "artifacts/run-003-control/run_meta.json"
    - "artifacts/run-004-treatment/execution.txt"
    - "artifacts/run-004-treatment/run_meta.json"
    - "artifacts/review-notes.md"
    - "artifacts/review-notes-iteration4.md"
    - "artifacts/task-validity-check.md"
    - "artifacts/task-validity-proof.txt"
    - "artifacts/metrics.json"
    - "artifacts/iteration4-reconciliation.md"
  created: "2026-04-15"
  updated: "2026-04-27"
  author: "GPT-5.3-Codex"
  iteration: 4
  evidence_level: experimental
  falsifiability:
    version: 1
    falsification_criterion: "Das Protokoll wäre nicht kausal, wenn Control- und Treatment-Arm bei Logic-Level-Komplexität (Iteration 4) gleiche Scope-Drift-Raten zeigen, oder wenn ein unabhängiger externer Blind-Review keinen Unterschied in Review-Friction zwischen den Armen feststellt."
    counter_hypotheses:
      - id: ceiling_effect
        statement: "Der 0/0-Scope-Drift in Iteration 3 entsteht durch Ceiling-Effekt bei Text-Level-Komplexität: beide Arme waren zu leicht für messbare Drift, unabhängig vom Protokoll."
        assessment:
          status: partially_checked
          outcome: inconclusive
          evidence_refs:
            - path: experiments/2026-04-15_agent-task-validity/results/result.md
              section: "Epistemische Lücken"
            - path: experiments/2026-04-15_agent-task-validity/results/decision.yml
          pending_checks:
            - "Iteration-4-Ausführung mit Logic-Level-Tasks (tasks.iteration4.jsonl)"
          limitations:
            - "Control-Arm (run-003-control) nur mit Text-Level-Tasks; kein höherer Komplexitätstest"
          confidence: low
      - id: executor_bias
        statement: "Der gleiche Executor für beide Arme (mit vollem Designwissen) macht einen messbaren Unterschied zwischen Control und Treatment unbeobachtbar."
        assessment:
          status: documented
          outcome: not_checked
          evidence_refs:
            - path: experiments/2026-04-15_agent-task-validity/results/result.md
              section: "Epistemische Lücken"
          pending_checks:
            - "Externes Blind-Review durch unabhängigen Reviewer (run-003-control vs run-004-treatment)"
            - "Replikation mit anderem Executor"
          limitations:
            - "Kein Blind-Review durchgeführt"
            - "Kein unabhängiger zweiter Executor"
          confidence: low

context:
  tools: ["LLM-Agent", "Git", "Pull Requests", "Code Review", "rg"]
  language: "Mixed"
  environment: "Vibe-Lab"
  triggered_by: "Consistency review: iteration-4 execution claims not backed by repo diffs"
  execution_scope: "Letzter evidenztragender Ausführungsstand ist Iteration 3 (run-003-control, run-004-treatment). Iteration 4 Taskset vorbereitet (tasks.iteration4.jsonl), aber Ausführungsclaims (run-005, run-006) nicht durch Repo-Diffs belegt — zurückgebaut. execution_status=executed basiert auf Iteration-3-Runs."
  completion_note: "Iteration 4 bleibt nach method.md unvollständig (keine belegten Repo-Diffs, Blind-Review und Replikation ausstehend). Dieser PR dient der epistemischen Korrektur und Vorbereitung, nicht der methodischen Vollendung von Iteration 4. Ein späterer PR ist für die tatsächliche Iteration-4-Ausführung nötig."
  taskset_note: "Iteration-4 uses tasks.iteration4.jsonl targeting Python validation scripts and CI workflow. tasks.iteration3.jsonl remains iteration-3 set; tasks.jsonl remains iteration-2 method-correction set."

evidence:
  format: jsonl
  path: results/evidence.jsonl
