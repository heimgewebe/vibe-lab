next_steps:
  - "Externes Blind-Review für Iteration 4 Diffs durchführen (verpflichtend)."
  - "Mindestens eine unabhängige Replikation mit anderem Executor/Session (verpflichtend)."
  - "Bei weiterhin 0 Drift: Task-Komplexität auf Architektur-Level (Level 3) anheben oder synthetische Drift-Fallen designen."
  - "Alternative Methodik erwägen: absichtlich mehrdeutige Tasks statt 'realistischere' Tasks."
