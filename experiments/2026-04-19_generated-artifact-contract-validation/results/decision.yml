# Decision (Template)
# Validiert gegen: schemas/decision.schema.json
# Semantik: docs/concepts/execution-bound-epistemics.md §10.1–10.2 (Decision-Type-Separation)

schema_version: "0.1.0"

# Drei Typen — genau einen wählen:
#   execution_assessment : Bewertet den Ausführungsstatus (zulässig auch bei designed / reconstructed)
#   result_assessment    : Bewertet Ergebnisse auf Basis vorhandener Evidenz
#   adoption_assessment  : Übernahme-Entscheidung — NUR bei execution_status ∈ {executed, replicated}
decision_type: "execution_assessment"

# Erlaubte verdict-Werte pro Typ (Schema erzwingt):
#   execution_assessment  : executed | reconstructed | not_executed | insufficient_proof
#   result_assessment     : confirms | refutes | mixed | inconclusive
#   adoption_assessment   : adopt | reject | defer
verdict: "executed"

confidence: "low"             # high | medium | low | none  (Pflicht bei result_/adoption_assessment)
date: "2026-04-19"             # updated: 2026-04-19 (gap assessment)
reviewer: "TBD"

rationale: |
  Run-001 on PR-58 remains documented with execution-proof artifacts.

  Run-002 is documented as an independent PR run on PR-61 (branch exp/run-002-instrumented) with artifacts under artifacts/run-002-pr61/. This run captured one blocking CI failure before any fix and one incremental fix cycle with subsequent green checks.

  Run-003 is now documented as an independent PR run on PR-62 (branch exp/run-003-instrumented) with run artifacts under artifacts/run-003-pr62/. The run contains: one source-document change (docs/foundations/repo-plan.md), generator double-run determinism check (confirmed idempotent), PR opened, CI observation. Result: zero blocking CI failures on first push. No fix cycle required. This is the first clean end-to-end run in this experiment.

  Run-004 is documented as an independent PR run on PR-63 (branch exp/run-004-controlled-friction) with artifacts under artifacts/run-004-pr63/. The run includes one controlled friction event: a small schema deviation in results/evidence.jsonl (missing required key `context`). This produced a blocking validate failure and a one-step schema fix. During consolidation, one additional blocking canonical-contract failure occurred (stale docs/_generated/system-map.md after adding run-004 artifacts) and was fixed via regeneration.

  Detection speed and remediation were explicitly measured for Run-004: detection_latency_seconds=47, fix_steps_required=2, diagnosis_clarity_score=4, unnecessary_commit_delta=2.

  Run-005 is documented as an independent PR run on PR-64 (branch exp/run-005-controlled-friction) with artifacts under artifacts/run-005-pr64/. It was executed as a calibration run with fixed scope and one controlled semantic friction injection (missing `context` in one evidence entry). After schema fix, one additional structural blocking failure occurred during consolidation (stale canonical system-map after adding run artifacts), then resolved via regeneration.

  Run-005 measured outcomes: ci_blocking_failures_total=2, fix_steps_required=2, manual_regen_steps=2, diagnosis_clarity_score=5, unnecessary_commit_delta=2, detection_latency_seconds=48, fix_duration_seconds=241.

  Decision type remains execution_assessment: five PR runs are now documented. Run-005 improves metric normalization and friction-class labeling but does not yet provide a sufficient non-contract baseline for result_assessment.

