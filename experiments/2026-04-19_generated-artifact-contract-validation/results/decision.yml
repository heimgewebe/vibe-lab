# Decision (Template)
# Validiert gegen: schemas/decision.schema.json
# Semantik: docs/concepts/execution-bound-epistemics.md §10.1–10.2 (Decision-Type-Separation)

schema_version: "0.1.0"

# Drei Typen — genau einen wählen:
#   execution_assessment : Bewertet den Ausführungsstatus (zulässig auch bei designed / reconstructed)
#   result_assessment    : Bewertet Ergebnisse auf Basis vorhandener Evidenz
#   adoption_assessment  : Übernahme-Entscheidung — NUR bei execution_status ∈ {executed, replicated}
decision_type: "execution_assessment"

# Erlaubte verdict-Werte pro Typ (Schema erzwingt):
#   execution_assessment  : executed | reconstructed | not_executed | insufficient_proof
#   result_assessment     : confirms | refutes | mixed | inconclusive
#   adoption_assessment   : adopt | reject | defer
verdict: "executed"

confidence: "low"             # high | medium | low | none  (Pflicht bei result_/adoption_assessment)
date: "2026-04-19"             # updated: 2026-04-19 (gap assessment)
reviewer: "TBD"

rationale: |
  Run-001 on PR-58 remains documented with execution-proof artifacts.

  Run-002 is now documented as an independent PR run on PR-61 (branch exp/run-002-instrumented) with run artifacts under artifacts/run-002-pr61/. The run contains: explicit discovery definition, one source-document change, generator double-run determinism check, CI observation, one blocking CI failure before any fix, one incremental fix cycle, and subsequent green checks.

  Decision type remains execution_assessment because the new state primarily improves execution-proof quality and run completeness. A full result_assessment is still premature: baseline comparison and broader metric stability are not yet sufficient for a robust hypothesis verdict.

# Pflicht bei adoption_assessment, optional sonst:
evidence_summary:
  observations: 19            # Anzahl Evidence-Entries in evidence.jsonl
  positive: 0                 # Positive Beobachtungen
  negative: 0                 # Negative Beobachtungen
  neutral: 19                 # Neutral: setup, run recording, friction, fix cycles

next_steps: |
  Keep decision_type at execution_assessment for this consolidation state. Prepare the next run with comparable scope and stricter baseline tracking. Re-evaluate switch to result_assessment after one additional independent run with stable measurement capture.

