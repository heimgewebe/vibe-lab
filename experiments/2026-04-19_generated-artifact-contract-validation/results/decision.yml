# Decision (Template)
# Validiert gegen: schemas/decision.schema.json
# Semantik: docs/concepts/execution-bound-epistemics.md §10.1–10.2 (Decision-Type-Separation)

schema_version: "0.1.0"

# Drei Typen — genau einen wählen:
#   execution_assessment : Bewertet den Ausführungsstatus (zulässig auch bei designed / reconstructed)
#   result_assessment    : Bewertet Ergebnisse auf Basis vorhandener Evidenz
#   adoption_assessment  : Übernahme-Entscheidung — NUR bei execution_status ∈ {executed, replicated}
decision_type: "execution_assessment"

# Erlaubte verdict-Werte pro Typ (Schema erzwingt):
#   execution_assessment  : executed | reconstructed | not_executed | insufficient_proof
#   result_assessment     : confirms | refutes | mixed | inconclusive
#   adoption_assessment   : adopt | reject | defer
verdict: "executed"

confidence: "low"             # high | medium | low | none  (Pflicht bei result_/adoption_assessment)
date: "2026-04-19"             # updated: 2026-04-19 (gap assessment)
reviewer: "TBD"

rationale: |
  Run-001 on PR-58 is documented with execution-proof artifacts. Two additional in-PR friction observations were added for PR-58 (canonical generator non-determinism: path resolution bug + .venv leak, causing at least three canonical regeneration states in one PR). These are not a separate run — they are part of PR-58.

  Run-003 is now documented as an independent PR run on PR-62 (branch exp/run-003-instrumented) with run artifacts under artifacts/run-003-pr62/. The run contains: one source-document change (docs/foundations/repo-plan.md), generator double-run determinism check (confirmed idempotent), PR opened, CI observation. Result: zero blocking CI failures on first push. No fix cycle required. This is the first clean end-to-end run in this experiment.

  Decision type remains execution_assessment: two independent PR runs are now documented on this branch. Switching to result_assessment requires systematic baseline comparison across at minimum three comparable runs with stable metric capture.

# Pflicht bei adoption_assessment, optional sonst:
evidence_summary:
  observations: 20            # Anzahl Evidence-Entries in evidence.jsonl
  positive: 0                 # Positive Beobachtungen
  negative: 0                 # Negative Beobachtungen
  neutral: 20                 # Neutral: setup, run recording, friction, fix cycles

next_steps: |
  With two independent PR runs now documented (PR-58/Run-001 and PR-62/Run-003), evaluate whether a result_assessment is now appropriate. Key comparison: Run-001 had multiple canonical regeneration cycles within PR and extensive in-PR friction; Run-003 had zero CI blocking failures and no fix cycle. A third comparable run or cross-run metric aggregation is needed before switching to result_assessment.

