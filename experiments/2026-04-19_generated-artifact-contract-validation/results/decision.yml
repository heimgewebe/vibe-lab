# Decision (Template)
# Validiert gegen: schemas/decision.schema.json
# Semantik: docs/concepts/execution-bound-epistemics.md §10.1–10.2 (Decision-Type-Separation)

schema_version: "0.1.0"

# Drei Typen — genau einen wählen:
#   execution_assessment : Bewertet den Ausführungsstatus (zulässig auch bei designed / reconstructed)
#   result_assessment    : Bewertet Ergebnisse auf Basis vorhandener Evidenz
#   adoption_assessment  : Übernahme-Entscheidung — NUR bei execution_status ∈ {executed, replicated}
decision_type: "execution_assessment"

# Erlaubte verdict-Werte pro Typ (Schema erzwingt):
#   execution_assessment  : executed | reconstructed | not_executed | insufficient_proof
#   result_assessment     : confirms | refutes | mixed | inconclusive
#   adoption_assessment   : adopt | reject | defer
verdict: "executed"

confidence: "low"             # high | medium | low | none  (Pflicht bei result_/adoption_assessment)
date: "2026-04-19"             # updated: 2026-04-19 (gap assessment)
reviewer: "TBD"

rationale: |
  Run-001 on PR-58 is documented with execution-proof artifacts. Two additional in-PR friction observations were added for PR-58 (canonical generator non-determinism: path resolution bug + .venv leak, causing at least three canonical regeneration states in one PR). These are not a separate run — they are part of PR-58.

  Separate from in-PR friction, one epistemic gap observation was added: Run-002 is currently not available as an independent PR run in the workspace.

  Run-002 assessment: no second independent PR run exists in the workspace. The two post-Run-001 commits (d561893, 7c44b07) are continuation commits on the same PR-58 branch — not a distinct PR run. Candidate matrix verdict: rejected (not a distinct pr_ref).

  result_assessment remains blocked until Run-002 is captured on a new, independent PR. The hypothesis (canonical/derived/ephemeral split reduces CI friction) cannot yet be evaluated — one run with incomplete metrics is insufficient.

# Pflicht bei adoption_assessment, optional sonst:
evidence_summary:
  observations: 10            # Anzahl Beobachtungen in evidence.jsonl (7 original + 3 added)
  positive: 0                 # Positive Beobachtungen
  negative: 0                 # Negative Beobachtungen — friction observed but not classified as positive/negative yet
  neutral: 10                 # Neutral: setup, run recording, metric gaps, friction observations

next_steps: |
  Capture Run-002 on the next independent PR under the canonical/derived/ephemeral contract. For that run, explicitly measure: ci_blocking_failures (CI log access required), manual_regen_steps (count regeneration commands), diagnosis_clarity_score (subjective 1-5). Then switch to result_assessment.

