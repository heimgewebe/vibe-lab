# Decision (Template)
# Validiert gegen: schemas/decision.schema.json
# Semantik: docs/concepts/execution-bound-epistemics.md §10.1–10.2 (Decision-Type-Separation)

schema_version: "0.1.0"

# Drei Typen — genau einen wählen:
#   execution_assessment : Bewertet den Ausführungsstatus (zulässig auch bei designed / reconstructed)
#   result_assessment    : Bewertet Ergebnisse auf Basis vorhandener Evidenz
#   adoption_assessment  : Übernahme-Entscheidung — NUR bei execution_status ∈ {executed, replicated}
decision_type: "result_assessment"

# Erlaubte verdict-Werte pro Typ (Schema erzwingt):
#   execution_assessment  : executed | reconstructed | not_executed | insufficient_proof
#   result_assessment     : confirms | refutes | mixed | inconclusive
#   adoption_assessment   : adopt | reject | defer
verdict: "mixed"

# Mapping for requested decision triad (adopted | rejected | partial)
# Canonical assessment axis remains `verdict`; `result_verdict` is a presentation mapping.
result_verdict: "partial"

confidence: "medium"             # high | medium | low | none  (Pflicht bei result_/adoption_assessment)
date: "2026-04-23"
reviewer: "GPT-5.3-Codex"
triggered_by: "user-request-2026-04-23-complete-result-assessment"

rationale: |
  Die Cross-Run-Aggregation (results/cross-run-assessment.md) zeigt sechs dokumentierte Runs
  mit stabiler Evidenzbasis aus results/evidence.jsonl und artifacts/run-*/execution.txt.

  Beleglage:
  - Run-003 ist ein sauberer Lauf ohne blocking failure (ci_blocking_failures=0).
  - Run-004 und Run-005 zeigen reproduzierbar semantische Schemafriktion
    (fehlender required key `context`) mit schneller und klarer Fehlerlokalisierung.
  - Run-003 bis Run-006 zeigen jeweils strukturelle Konsolidierungsfriktion
    (stale docs/_generated/system-map.md nach Artifact-Write) mit Zusatz-Commit.

  Damit ist der "clarifies friction"-Teil der Hypothese bestätigt (Friktionstypen sind
  trennbar und diagnostisch klar), während eine robuste Gesamtreduktion der Friktion
  nicht belegt ist. Ergebnis deshalb: mixed (requested mapping: partial).

# Pflicht bei adoption_assessment, optional sonst:
evidence_summary:
  observations: 77
  runs_documented: 6
  structural_stale_system_map_runs: 4
  controlled_schema_injection_runs: 2
  clean_initial_runs: 1

justification:
  - "Friction wurde klarer klassifiziert (semantic vs structural) und in mehreren Runs reproduzierbar beobachtet."
  - "Diagnosepfade sind konkret und schnell (Run-004/005/006 mit dokumentierten Zeitmetriken)."
  - "Netto-Reduktion der Friktion ist nicht robust belegt, da strukturelle Konsolidierungsfriktion wiederkehrt."

conditions:
  - "Valid, wenn Evidence-Eintraege strikt schemakonform sind und canonical regeneration direkt nach Artifact-Writes erfolgt."
  - "Nicht valid als Aussage 'Friktion sinkt insgesamt', solange stale-system-map im Konsolidierungspfad wiederkehrt."
  - "Nicht valid fuer Generalisierung ueber dieses Repository hinaus ohne externe Replikation."

next_steps: |
  Abschluss dieses Experiments mit result_assessment:mixed beibehalten.
  Folgearbeit in ein separates, enges Folgeexperiment auslagern:
  "Ist stale system-map primaer Workflow-Artefakt oder Architekturproblem?".

next_actions:
  - "Kein weiterer gleichartiger Run in diesem Experiment."
  - "Folgeexperiment fuer workflow-vs-architecture-Isolation anlegen."
  - "Messfeld-Harmonisierung als Pflicht fuer kuenftige Cross-Run-Vergleiche festziehen."

hypothesis_status:
  confirmed:
    - "clarifies friction"
  falsified:
    - "reduces friction (robust overall)"
  unresolved:
    - "Anteil workflow vs architecture am stale-system-map Pattern"

