schema_version: "0.1.0"

experiment:
  name: "Agent Failure Surface Mapping"
  hypothesis: "Die Grenze zwischen 'agentisch korrekt' und 'agentisch falsch' ist im aktuellen Contract-/Fixture-Layer nicht überall scharf; gezielt konstruierte Drift-, Widerspruchs-, Chain- und Replay-Fälle decken Toleranzzonen auf, die in Fixtures/Tests/Validatoren überführt werden können."
  status: testing
  category: workflow
  execution_status: executed
  execution_refs:
    - results/evidence.jsonl
    - results/result.md
    - results/decision.yml
    - results/replay-gap-candidates.md
    - results/phase5-adversarial-agent-simulation.md
    - results/phase-f-rrg03-locator-drift.md
    - artifacts/run-phase2/run_meta.json
    - artifacts/run-phase3/run_meta.json
    - artifacts/run-phase5/run_meta.json
    - artifacts/run-phase-f-rrg03/run_meta.json
  created: "2026-04-23"
  updated: "2026-04-30"
  author: "Claude Opus 4.7"
  iteration: 1
  evidence_level: experimental
  falsifiability:
    version: 1
    falsification_criterion: "Die Gesamthypothese ist geschwächt, wenn keine einzige Phase eine neue testbare Toleranzzone identifiziert oder wenn qualitative Folgephasen nur scheinbar Historie ersetzen statt sie kumulativ zu ergänzen. Sie ist gestärkt, wenn mindestens eine Phase eine reproduzierbare Lücke in Fixture/Test/Validator überführt und spätere Phasen die bestehende Serienhistorie konsistent fortschreiben."
    counter_hypotheses:
      - id: phase2_empty_state_tolerated
        statement: "Leere exact_*-Strings auf der semantisch behaupteten Seite sind keine echte semantic_contradiction, sondern zulässige optionale Snapshots ohne Aussage - der Validator überinterpretiert ein erlaubtes Nichtvorhandensein als Fehler."
        assessment:
          status: checked
          outcome: supports_primary
          evidence_refs:
            - path: results/evidence.jsonl
              section: "validator_signal_before_patch / validator_signal_after_patch"
            - path: artifacts/run-phase2/execution.txt
      - id: phase3_chain_transitions_already_covered
        statement: "Die bestehenden Chain-Validatoren decken die in method.md für Phase 3 benannten Transition-Fehlerklassen bereits ausreichend ab, sodass keine Validator- oder Fixture-Erweiterung nötig ist."
        assessment:
          status: checked
          outcome: supports_counterhypothesis
          evidence_refs:
            - path: results/evidence.jsonl
              section: "phase_3_candidate_uncaught_count"
            - path: artifacts/run-phase3/execution.txt
      - id: phase5_scope_boundary_is_validator_failure
        statement: "Die Tatsache, dass epistemisch leere, formal gültige Outputs den Validator-Stack passieren, zeigt eine echte Validator-Schwäche (passed_but_wrong), nicht nur eine Scope-Grenze."
        assessment:
          status: checked
          outcome: supports_primary
          evidence_refs:
            - path: results/evidence.jsonl
              section: "phase_5_patch_gate"
            - path: artifacts/run-phase5/execution.txt

