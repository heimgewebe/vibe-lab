rationale: |
  Kumulativer Serienstand nach Abschluss aller fünf Phasen der Reihe
  Agent Failure Surface Mapping. Verdict `mixed`, weil die Phasen
  unterschiedliche Ergebnisse haben und alle epistemisch belastbar sind:

  **Phase 2 — Semantic Contradiction (confirms):**
  H1 ("empty asserted state") wurde reproduzierbar belegt. Vor Patch lieferte
  `validate_cross_contract` auf dem Kandidaten `change_type=add +
  exact_after=""` keine Fehler (Toleranz-Rate 6/6). Nach Erweiterung von
  `_validate_semantic_anti_invariants` schlägt der Fall mit
  `semantic_contradiction` an; Positiv-Kontrast bleibt valide. Vollständiger
  Phasen-Bericht: `results/phase2-semantic-contradiction.md`.

  **Phase 3 — Chain Integrity Stress (refutes phase-3 hypothesis):**
  Die Phase-3-Leithypothese wurde im geprüften Kandidatenraum widerlegt.
  7/7 konstruierte Transitions lösten ≥1 dokumentierten Fehlercode aus;
  Toleranz-Rate=0/7. No-Patch. Vollständiger Phasen-Bericht:
  `results/phase3-chain-integrity-stress.md`.

  **Phase 4 — Replay Reality Gap (qualitative_inventory, no_patch):**
  Qualitative Kandidateninventur dokumentiert; kein Validator-/Schema-Eingriff.
  Priorisierte Phase-F-Kandidaten: RRG-03, RRG-01, RRG-02.

  **Phase 5 — Adversarial Agent Simulation (out_of_scope_documented):**
  Vier adversariale Simulationen (P5-A bis P5-D) passierten alle den
  Validator-Stack (exit 0, Toleranz-Rate 4/4). Kein Fall war `passed_but_wrong`;
  alle vier sind `passed_but_out_of_scope`. Die Vorhypothese (Stack kann durch
  epistemisch leere Outputs getäuscht werden) wurde bestätigt — mit der
  Präzisierung, dass dies keine Validator-Schwäche ist, sondern korrekt
  implementierte Scope-Grenze. Vier Scope-Grenzen in
  `decisions/process/p5-validator-scope-boundary.yml` formalisiert.
  Fixture-Matrix um §5.5–5.8 erweitert. Kein Patch.

  Die Gesamthypothese (Grenze zwischen agentisch korrekt und agentisch falsch
  ist nicht überall scharf) ist nach 5 Phasen bestätigt: Phase 2 hat eine
  bislang tolerierte Fehlerklasse verankert; Phase 5 hat gezeigt, dass
  inhaltliche Tiefe bewusst aus dem Validator-Scope ausgelagert ist. Beide
  Ergebnisse sind epistemisch belastbar.

