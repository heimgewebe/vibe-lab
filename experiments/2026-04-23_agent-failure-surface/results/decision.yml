rationale: |
  Phase 3 (Chain Integrity Stress) der Reihe Agent Failure Surface
  Mapping refutiert die Phase-3-Leithypothese ("valide Einzelcommands
  können in falscher Reihenfolge oder falscher Kombination als Chain
  ungültig sein, ohne dass die bestehenden Validatoren das melden")
  für die geprüften Kandidaten und bestätigt zugleich die Antithese
  ("die bestehenden Chain-Validatoren decken diese Fehler bereits
  ausreichend ab"). Sieben Kandidaten aus `method.md` §"Phase 3
  Injektions-Set" wurden direkt gegen `validate_chain` geprüft; alle
  sieben lösen mindestens einen dokumentierten Fehlercode aus
  (Toleranz-Rate=0/7). Ein zusätzlicher Kandidat
  (`validate_change(locator B abweichend)`) liegt outside_scope, weil
  das `command.validate_change`-Schema kein `locator`-Feld definiert.
  Konsequenz nach `method.md` §"Patch-Gate": **No-Patch-Pfad** —
  keine Erweiterung von `scripts/docmeta/validate_command_chain.py`,
  keine Änderung an `tests/fixtures/command_chains/`,
  `contracts/command-semantics.md` oder
  `docs/reference/agent-operability-fixture-matrix.md`. Die
  Mindestschärfe (`method.md` §"Mindestschärfe der
  Strukturkonsequenz") ist über die zweite zulässige Form erfüllt:
  belegte Nicht-Änderungsentscheidung mit Kandidatenmatrix
  (`results/result.md` §"Kandidatenmatrix") und Testausgabe
  (`artifacts/run-phase3/execution.txt`). Confidence=medium, weil die
  Negativ-Aussage strikt auf den geprüften Kandidatenraum begrenzt
  ist; die starke Wirkung von `_validate_sequence` als Generalfänger
  hängt an der harten v0.1-Sequenz-Bindung und ist bei künftigen
  v0.2-Lockerungen erneut zu prüfen.
