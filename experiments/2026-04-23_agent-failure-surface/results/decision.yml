rationale: |
  Kumulativer Serienstand nach Abschluss von Phase 2 und Phase 3 der Reihe
  Agent Failure Surface Mapping. Verdict `mixed`, weil die beiden
  abgeschlossenen Phasen entgegengesetzte Ergebnisse haben und beide
  epistemisch belastbar sind:

  **Phase 2 — Semantic Contradiction (confirms):**
  H1 ("empty asserted state") wurde reproduzierbar belegt. Vor Patch lieferte
  `validate_cross_contract` auf dem Kandidaten `change_type=add +
  exact_after=""` keine Fehler (Toleranz-Rate 6/6). Nach Erweiterung von
  `_validate_semantic_anti_invariants` schlägt der Fall mit
  `semantic_contradiction` an; Positiv-Kontrast bleibt valide. Signalwechsel
  durch Negativ-Fixtures, Tests und `make validate` reproduziert. Vollständiger
  Phasen-Bericht: `results/phase2-semantic-contradiction.md`, Laufartefakt:
  `artifacts/run-phase2/`.

  **Phase 3 — Chain Integrity Stress (refutes phase-3 hypothesis):**
  Die Phase-3-Leithypothese ("valide Einzelcommands können in falscher
  Reihenfolge oder Kombination als Chain ungültig sein, ohne dass bestehende
  Validatoren das melden") wurde im geprüften Kandidatenraum widerlegt.
  7/7 konstruierte Transitions lösten ≥1 dokumentierten Fehlercode aus;
  Toleranz-Rate=0/7. Phase-3-Antithese ("bestehende Chain-Validatoren decken
  diese Fehler bereits ab") bestätigt. No-Patch. Vollständiger Phasen-Bericht:
  `results/phase3-chain-integrity-stress.md`, Laufartefakt: `artifacts/run-phase3/`.

  Phase 3 widerlegt nicht Phase 2: es gibt zwei voneinander unabhängige
  Teilhypothesen, die jeweils separat getestet wurden. Das Gesamtexperiment
  ist weiter offen (Phase 4 und 5 ausstehend).

  Confidence=medium für den aktuellen Serienstand, weil:
  (a) Phase 2 scharfe Signale liefert (Signalwechsel reproduziert),
  (b) Phase 3 scharfe Negativ-Aussage liefert (begrenzt auf geprüfte Kandidaten),
  (c) Phase 4 und 5 die Gesamtbewertung noch verschieben können.
