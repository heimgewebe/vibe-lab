# Experiment Manifest (Template)
# Validiert gegen: schemas/experiment.manifest.schema.json

schema_version: "0.1.0"

experiment:
  name: ""                    # Kurzname des Experiments
  hypothesis: ""              # Zu prüfende Hypothese
  status: idea                # idea | designed | testing | adopted | rejected | blocked | inconclusive — Ist-Zustand
  category: technique         # style | technology | technique | workflow | combo
  execution_status: designed  # designed | prepared | executed | replicated — Ist-Zustand; Abweichungen von vorliegenden Artefakten sichtbar machen, nicht still übergehen
                              # (Durchführungsgrad, orthogonal zu status und evidence_level)
  execution_refs: []          # Spurverweise — befüllen sobald execution_status executed/replicated
  created: "YYYY-MM-DD"
  updated: "YYYY-MM-DD"       # Ist-Zustand, nicht Planungsdatum. Bewusst aktualisieren — zeitliche Entwicklung bleibt sichtbar.
  author: ""
  iteration: 1
  evidence_level: experimental  # anecdotal | experimental | replicated
  # replicated_from: ""      # Pfad zum Original-Experiment bei Replikation
  # related_idea: ""          # Referenz auf Idea-Issue (z.B. #42)
  # adoption_basis: executed  # executed | replicated | reconstructed
                              # Pflicht bei status: adopted. 'reconstructed' nur für Altbestand zulässig
                              # (Adoption ohne erfassten Execution-Proof, nur historisch).
                              # Siehe docs/blueprints/blueprint-v2.md Übergangsregel.

context:
  tools: []                   # Verwendete Tools und Modelle
  language: ""                # Primäre Programmiersprache
  environment: ""             # Entwicklungsumgebung

evidence:
  format: jsonl
  path: results/evidence.jsonl
