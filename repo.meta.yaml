# repo.meta.yaml — Maschinenlesbare Repo-Verfassung
# Handgepflegt. Kanonisch. Nicht generiert.
# Lesereihenfolge: repo.meta.yaml → AGENTS.md → agent-policy.yaml → README.md → docs/index.md

schema_version: "0.1.0"

identity:
  name: vibe-lab
  purpose: "Exekutierbarer Erkenntnisraum für Vibe-Coding-Praktiken"
  vision: docs/foundations/vision.md
  plan: docs/foundations/repo-plan.md

truth_model:
  # Kanonische Quellen sind Wahrheit. Alles andere leitet sich ab.
  canonical_sources:
    - repo.meta.yaml
    - AGENTS.md
    - agent-policy.yaml
    - "contracts/*"
    - "schemas/*"
  foundational_sources:
    - docs/foundations/vision.md
    - docs/foundations/repo-plan.md
  navigation:
    - docs/index.md
  diagnosis:
    - "docs/_generated/*"
  # Wahrheitshierarchie: canonical > operative > navigation > diagnosis
  hierarchy:
    - canonical_sources
    - foundational_sources
    - operative_documents
    - navigation
    - diagnosis

operative_documents:
  - README.md
  - CONTRIBUTING.md
  - ".vibe/*"

path_logic:
  capture_zone:
    description: "Roher, unstrukturierter Ideeneingang"
    paths:
      - "raw-vibes/*"
  lab_zone:
    description: "Freie Exploration, hohe Varianz"
    paths:
      - "experiments/*"
  library_zone:
    description: "Validiertes Wissen, harte Checks"
    paths:
      - "catalog/*"
      - "prompts/*"
      - "benchmarks/*"
      - "instruction-blocks/*"
  generated:
    description: "Maschinell erzeugt, niemals manuell editiert"
    paths:
      - "exports/*"
      - ".cursor/rules/*"
      - "docs/_generated/*"
  governance:
    description: "Steuerungsdokumente und Verträge"
    paths:
      - ".vibe/*"
      - "contracts/*"
      - "decisions/*"

safe_read_paths:
  - README.md
  - "raw-vibes/*"
  - CONTRIBUTING.md
  - repo.meta.yaml
  - AGENTS.md
  - agent-policy.yaml
  - "docs/*"
  - "catalog/*"
  - "schemas/*"
  - "contracts/*"

required_checks:
  - name: schema-validation
    script: scripts/docmeta/validate_schema.py
    description: "Validiert Artefakte gegen JSON-Schemas"
  - name: relations-validation
    script: scripts/docmeta/validate_relations.py
    description: "Prüft Frontmatter-Relationen auf Konsistenz"

contribution_types:
  - Innovation
  - Experiment
  - "Catalog Entry"
  - Combo
  - Prompt
  - "Decision Artifact"
